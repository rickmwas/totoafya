<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme & app color -->
    <meta name="theme-color" content="#1B6B5A" />
    <meta name="msapplication-TileColor" content="#1B6B5A" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TotoAfya" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- iOS splash screens (portrait) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- SEO / Open Graph -->
    <meta name="description" content="Your trusted companion for maternal and child health in Kenya" />
    <meta name="application-name" content="TotoAfya" />
    <meta property="og:title" content="TotoAfya — Kenya MCH" />
    <meta property="og:description" content="Maternal and child health tracking for Kenyan families" />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <title>TotoAfya</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Prevent flash of unstyled content -->
    <style>
      body { background: #F7F5F0; margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
